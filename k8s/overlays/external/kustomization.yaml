apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# External-exposure overlay: base (ClusterIP services, deployment, etc.) PLUS a
# public LoadBalancer edge. The per-protocol ClusterIP services from base remain
# for in-cluster addressing; tid-edge is the public entry point.
resources:
  - ../../base
  - service-edge.yaml

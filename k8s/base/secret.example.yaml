# Template only. Do NOT commit a real token.
#
# Generate and apply a real secret with:
#   kubectl -n tid-recon-dog create secret generic tid-secrets \
#     --from-literal=OPERATOR_TOKEN="$(openssl rand -hex 24)"
#
# Or copy this file, fill it in, and `kubectl apply -f` it (kept out of kustomize
# so an example value never ships to a cluster by accident).
apiVersion: v1
kind: Secret
metadata:
  name: tid-secrets
  namespace: tid-recon-dog
type: Opaque
stringData:
  # Bearer token for the operator console. REPLACE before use.
  OPERATOR_TOKEN: "REPLACE_WITH_openssl_rand_hex_24"
  # Optional: POST risk-escalation alerts here.
  # ALERT_WEBHOOK_URL: "https://example.invalid/webhook"

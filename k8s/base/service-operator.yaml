# Operator metrics plane. ClusterIP ONLY — deliberately never given an external
# Service, so the dashboard/API can never be reached from outside the cluster
# and cannot be used to fingerprint the deployment as a honeypot.
# Access it with:  kubectl -n tid-recon-dog port-forward svc/tid-operator 9090:9090
apiVersion: v1
kind: Service
metadata:
  name: tid-operator
  labels:
    app.kubernetes.io/name: tid-recon-dog
    app.kubernetes.io/component: operator
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tid-recon-dog
  ports:
    - name: metrics
      port: 9090
      targetPort: operator
      protocol: TCP

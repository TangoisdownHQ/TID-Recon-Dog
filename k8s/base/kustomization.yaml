apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tid-recon-dog

resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - deployment.yaml
  - service-operator.yaml
  - services-honeypot.yaml
  - networkpolicy.yaml
  # secret.example.yaml is intentionally NOT listed — create the real secret
  # out-of-band (see secret.example.yaml) so no example token reaches a cluster.

# Point this at your built/pushed image. Override per environment in an overlay
# or with `kustomize edit set image`.
images:
  - name: tid-recon-dog
    newName: tid-recon-dog
    newTag: latest

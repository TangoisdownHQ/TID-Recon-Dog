# Attacker-facing decoy services, one Service object per protocol (idiomatic
# k8s addressing + clean per-service surface). Each maps the REAL well-known
# port onto the container's high port, so in-cluster clients and scanners see
# genuine-looking services (ssh on 22, postgres on 5432, ...).
#
# Default type is ClusterIP (safe to apply anywhere, no cloud LB cost). For
# real external exposure use the overlay:  kubectl apply -k k8s/overlays/external
---
apiVersion: v1
kind: Service
metadata: { name: tid-ssh, labels: { app.kubernetes.io/name: tid-recon-dog, app.kubernetes.io/component: ssh } }
spec:
  type: ClusterIP
  selector: { app.kubernetes.io/name: tid-recon-dog }
  ports: [{ name: ssh, port: 22, targetPort: ssh, protocol: TCP }]
---

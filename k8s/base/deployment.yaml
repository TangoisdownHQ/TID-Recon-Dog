apiVersion: apps/v1
kind: Deployment
metadata:
  name: tid-recon-dog
  labels:
    app.kubernetes.io/name: tid-recon-dog
spec:
  # File-backed attacker memory is a single-writer store, so this runs as a
  # single replica. Recreate avoids two pods racing on the ReadWriteOnce volume.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: tid-recon-dog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tid-recon-dog
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tid-recon-dog
          image: tid-recon-dog:latest
          imagePullPolicy: IfNotPresent
          args: ["dist/index.js", "start", "all"]
          envFrom:
            - configMapRef:
                name: tid-config
            - secretRef:
                name: tid-secrets
          ports:
            - { name: http, containerPort: 3000, protocol: TCP }
            - { name: ssh, containerPort: 2222, protocol: TCP }
            - { name: ftp, containerPort: 2121, protocol: TCP }
            - { name: postgres, containerPort: 5432, protocol: TCP }
            - { name: rtsp, containerPort: 8554, protocol: TCP }
            - { name: rdp, containerPort: 3389, protocol: TCP }
            - { name: telnet, containerPort: 2323, protocol: TCP }
            - { name: modbus, containerPort: 1502, protocol: TCP }
            - { name: snmp, containerPort: 16100, protocol: UDP }
            - { name: smtp, containerPort: 2525, protocol: TCP }
            - { name: operator, containerPort: 9090, protocol: TCP }
          livenessProbe:
            httpGet:
              path: /healthz
              port: operator
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: operator
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - { name: runtime, mountPath: /app/runtime }
            - { name: logs, mountPath: /app/logs }
            - { name: uploads, mountPath: /app/uploads }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: runtime
          persistentVolumeClaim:
            claimName: tid-runtime
        - name: logs
          emptyDir: {}
        - name: uploads
          emptyDir: {}
        - name: tmp
          emptyDir: {}
